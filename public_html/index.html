	<!-- Firebase Scripts -->
    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging.js";

    const firebaseConfig = {
    apiKey: window.env.VITE_FIREBASE_API_KEY,
    authDomain: window.env.VITE_FIREBASE_AUTH_DOMAIN,
    projectId: window.env.VITE_FIREBASE_PROJECT_ID,
    storageBucket: window.env.VITE_FIREBASE_STORAGE_BUCKET,
    messagingSenderId: window.env.VITE_FIREBASE_MESSAGING_SENDER_ID,
    appId: window.env.VITE_FIREBASE_APP_ID,
    measurementId: window.env.VITE_FIREBASE_MEASUREMENT_ID
};

    // Initialiser Firebase
    const app = initializeApp(firebaseConfig);
    const messaging = getMessaging(app);

    // Fonction pour obtenir un token
    async function requestNotificationPermission() {
        try {
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                const token = await getToken(messaging, { vapidKey: 'TA_VAPID_KEY' });
                console.log('Token Firebase:', token);
            } else {
                console.warn('Permission de notification refusée.');
            }
        } catch (error) {
            console.error('Erreur lors de l\'obtention du token Firebase:', error);
        }
    }

    // Demander la permission au chargement
    requestNotificationPermission();

    // Réception de messages
    onMessage(messaging, (payload) => {
        console.log('Message reçu:', payload);
        new Notification(payload.notification.title, {
            body: payload.notification.body,
            icon: '/images/INFOS-192.png'
        });
    });
</script>

// Service Worker Registration
async function registerServiceWorker() {
    if ('serviceWorker' in navigator) {
        try {
            const registration = await navigator.serviceWorker.register('/service-worker.js', {
                scope: '/',
                updateViaCache: 'none'
            });

            console.log('ServiceWorker enregistré avec succès:', registration);

            // Gestion de la mise à jour du Service Worker
            registration.addEventListener('updatefound', () => {
                const newWorker = registration.installing;
                console.log('Nouveau service worker en installation');

                newWorker.addEventListener('statechange', () => {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                        console.log('Nouveau Service Worker installé');
                        if (registration.waiting) {
                            registration.waiting.postMessage({ type: 'SKIP_WAITING' });
                        }
                    }
                });
            });

            // Écouter les changements d'état
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                console.log('Service Worker mis à jour');
                window.location.reload();
            });

            return registration;
        } catch (error) {
            console.error('Erreur d\'enregistrement du ServiceWorker:', error);
            throw error;
        }
    }
}

// PWA Installation
class PWAInstaller {
    constructor() {
        this.deferredPrompt = null;
        this.installButton = document.getElementById('menuInstall');
        this.setupEventListeners();
    }

    setupEventListeners() {
        // Masquer le bouton par défaut
        if (this.installButton) {
            this.installButton.style.display = 'none';
        }

        window.addEventListener('beforeinstallprompt', this.handleBeforeInstallPrompt.bind(this));
        window.addEventListener('appinstalled', this.handleAppInstalled.bind(this));
    }

    async handleBeforeInstallPrompt(event) {
        event.preventDefault();
        this.deferredPrompt = event;

        if (this.installButton) {
            this.installButton.style.display = 'block';
            this.installButton.addEventListener('click', this.handleInstallClick.bind(this), { once: true });
        }
    }

    async handleInstallClick(event) {
        event.preventDefault();
        if (!this.deferredPrompt) return;

        try {
            const result = await this.deferredPrompt.prompt();
            console.log('Résultat de l\'installation:', result);
            
            if (result.outcome === 'accepted') {
                console.log('PWA installée avec succès');
                this.installButton.style.display = 'none';
            }
        } catch (error) {
            console.error('Erreur lors de l\'installation:', error);
        } finally {
            this.deferredPrompt = null;
        }
    }

    handleAppInstalled() {
        console.log('PWA installée avec succès');
        if (this.installButton) {
            this.installButton.style.display = 'none';
        }
        this.deferredPrompt = null;
    }
}

// App Initialization
class AppInitializer {
    static async init() {
        try {
            // Gestion du bouton retour et fermeture de l'application
            this.setupBackButtonHandling();
            
            // Enregistrer le Service Worker
            await registerServiceWorker();

            // Initialiser l'installateur PWA
            new PWAInstaller();

            // Initialiser ContentManager
            console.log('Chargement de ContentManager...');
            const contentModule = await import('./js/content.js');
            window.contentManager = new contentModule.default();
            await window.contentManager.init();
            console.log('Content Manager initialisé');

            // Initialiser ChatManager
            console.log('Chargement de ChatManager...');
            try {
                const chatModule = await import('/js/chatManager.js');
                console.log('Module ChatManager chargé:', chatModule);
                window.chatManager = new chatModule.default();
                await window.chatManager.init();
                console.log('Chat Manager initialisé');
            } catch (chatError) {
                console.error('Erreur spécifique ChatManager:', chatError);
                console.error('Stack trace:', chatError.stack);
            }

        } catch (error) {
            console.error('Erreur d\'initialisation:', error);
            console.error('Stack trace:', error.stack);
        }
    }  // Fermeture de init()

    static setupBackButtonHandling() {
        // Ajouter l'état initial dans l'historique
        history.pushState(null, '', window.location.pathname);

        window.addEventListener('popstate', async (e) => {
            e.preventDefault();
            
            // Si le chat est ouvert, le fermer
            if (window.chatManager && window.chatManager.isOpen) {
                window.chatManager.closeChat();
                history.pushState(null, '', window.location.pathname);
                return;
            }
            
            // Si le chat n'est pas ouvert, quitter l'application
            if (confirm('Voulez-vous vraiment quitter l\'application ?')) {
                window.close();
            } else {
                history.pushState(null, '', window.location.pathname);
            }
        });
    }
} 
// Démarrer l'application quand le DOM est prêt
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => AppInitializer.init());
} else {
    AppInitializer.init();
}
